<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Product Store - 관리자 모드</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --danger-color: #e74c3c;
            --success-color: #2ecc71;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; color: #333; }

        /* 메뉴 버튼 스타일 */
        .menu-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-main { background: var(--primary-color); color: white; }
        .btn-main:hover { background: #357abd; }

        /* 섹션 제어 */
        .content-section { display: none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        .active { display: block; }

        /* 테이블 스타일 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th { background-color: #f8f9fa; }

        /* 폼 스타일 */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }

        .stat-badge {
            font-size: 0.8em;
            padding: 2px 6px;
            border-radius: 10px;
            background: #eee;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 상품 관리 시스템</h1>

    <div class="menu-bar">
        <button class="btn-main" onclick="showSection('list')">1. 상품 리스트</button>
        <button class="btn-main" onclick="showSection('create')">2. 상품 등록</button>
        <button class="btn-main" onclick="showSection('update')">3. 상품 수정/삭제</button>
        <button class="btn-main" style="background:#666;" onclick="window.close()">9. 프로그램 종료</button>
    </div>

    <div id="section-list" class="content-section active">
        <h3>📋 등록된 상품 목록</h3>
        <table>
            <thead>
                <tr>
                    <th>No</th>
                    <th>상품명</th>
                    <th>등록자</th>
                    <th>조회/좋아요</th>
                    <th>상태</th>
                </tr>
            </thead>
            <tbody id="product-table-body">
                </tbody>
        </table>
    </div>

    <div id="section-create" class="content-section">
        <h3>✨ 신규 상품 등록</h3>
        <div class="form-group">
            <label>상품명</label>
            <input type="text" id="reg-name" placeholder="예: 니트 가디건">
        </div>
        <div class="form-group">
            <label>등록자(ID)</label>
            <input type="text" id="reg-writer" value="kkw">
        </div>
        <div class="form-group">
            <label>비밀번호 설정</label>
            <input type="password" id="reg-pw" placeholder="수정/삭제 시 필요">
        </div>
        <button class="btn-main" style="background:var(--success-color);" onclick="addProduct()">상품 등록하기</button>
    </div>

    <div id="section-update" class="content-section">
        <h3>🔧 상품 수정 및 삭제</h3>
        <div class="form-group">
            <label>제어할 상품 번호(No)</label>
            <input type="number" id="target-no">
        </div>
        <div class="form-group">
            <label>비밀번호 확인</label>
            <input type="password" id="target-pw">
        </div>
        <hr>
        <h4>수정할 내용 (수정 시에만 입력)</h4>
        <div class="form-group">
            <label>새 상품명</label>
            <input type="text" id="update-name">
        </div>
        <button class="btn-main" onclick="updateProduct()">수정 적용</button>
        <button class="btn-main" style="background:var(--danger-color);" onclick="deleteProduct()">상품 삭제</button>
    </div>
</div>

<script>
    // 파이썬의 리스트 역할을 하는 자바스크립트 객체 배열
    let products = [
        { no: 1, name: "clothes", writer: "1234", pw: "0000", visit: 10, hit: 5 },
        { no: 2, name: "shoes", writer: "2345", pw: "1111", visit: 5, hit: 2 },
        { no: 3, name: "pants", writer: "3456", pw: "2222", visit: 20, hit: 12 }
    ];

    // 섹션 전환 함수
    function showSection(sectionId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById('section-' + sectionId).classList.add('active');
        if(sectionId === 'list') renderList();
    }

    // R: 상품 리스트 출력 (Read)
    function renderList() {
        const tbody = document.getElementById('product-table-body');
        tbody.innerHTML = '';

        if(products.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">등록된 상품이 없습니다.</td></tr>';
            return;
        }

        products.forEach(p => {
            tbody.innerHTML += `
                <tr>
                    <td>${p.no}</td>
                    <td><strong onclick="viewDetail(${p.no})" style="cursor:pointer; color:blue;">${p.name}</strong></td>
                    <td>${p.writer}</td>
                    <td>
                        <span class="stat-badge">👁️ ${p.visit}</span>
                        <span class="stat-badge">❤️ ${p.hit}</span>
                    </td>
                    <td><span style="color:green;">판매중</span></td>
                </tr>
            `;
        });
    }

    // C: 상품 등록 (Create)
    function addProduct() {
        const name = document.getElementById('reg-name').value;
        const writer = document.getElementById('reg-writer').value;
        const pw = document.getElementById('reg-pw').value;

        if(!name || !pw) return alert("상품명과 비밀번호를 입력하세요.");

        const newNo = products.length > 0 ? products[products.length - 1].no + 1 : 1;

        products.push({
            no: newNo,
            name: name,
            writer: writer,
            pw: pw,
            visit: 0,
            hit: 0
        });

        alert(`상품 [${name}] 등록이 완료되었습니다!`);
        clearInputs(['reg-name', 'reg-pw']);
        showSection('list');
    }

    // U: 상품 수정 (Update)
    function updateProduct() {
        const no = parseInt(document.getElementById('target-no').value);
        const pw = document.getElementById('target-pw').value;
        const newName = document.getElementById('update-name').value;

        const p = products.find(item => item.no === no);

        if(!p) return alert("해당 번호의 상품이 없습니다.");
        if(p.pw !== pw) return alert("비밀번호가 일치하지 않습니다.");
        if(!newName) return alert("새로운 상품명을 입력하세요.");

        p.name = newName;
        alert("상품 수정이 완료되었습니다.");
        showSection('list');
    }

    // D: 상품 삭제 (Delete)
    function deleteProduct() {
        const no = parseInt(document.getElementById('target-no').value);
        const pw = document.getElementById('target-pw').value;

        const index = products.findIndex(item => item.no === no);

        if(index === -1) return alert("해당 번호의 상품이 없습니다.");
        if(products[index].pw !== pw) return alert("비밀번호가 일치하지 않습니다.");

        if(confirm("정말로 삭제하시겠습니까?")) {
            products.splice(index, 1);
            alert("삭제되었습니다.");
            showSection('list');
        }
    }

    // 상세 보기 (조회수 증가 로직)
    function viewDetail(no) {
        const p = products.find(item => item.no === no);
        p.visit++; // 조회수 증가
        alert(`[상세정보]\n상품명: ${p.name}\n등록자: ${p.writer}\n조회수: ${p.visit}\n좋아요: ${p.hit}`);
        renderList();
    }

    function clearInputs(ids) {
        ids.forEach(id => document.getElementById(id).value = '');
    }

    // 초기 실행
    renderList();
</script>

</body>
</html>
